services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindmill-backend
    restart: unless-stopped
    ports:
      - "5005:5005"
    env_file:
      - .env
    volumes:
      - mindmill-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mindmill-network

volumes:
  mindmill-uploads:
    driver: local

networks:
  mindmill-network:
    driver: bridge
